name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update version and commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          npm pkg set version=${{ steps.version.outputs.version }}
          git add package.json
          git diff --cached --quiet && echo "Version already up to date" || (git commit -m "chore: update version to ${{ steps.version.outputs.version }}" && git push origin main)

      - name: Publish to npm
        run: |
          PKG=$(npm pkg get name | tr -d '"')
          VER=${{ steps.version.outputs.version }}
          if npm view "${PKG}@${VER}" version > /dev/null 2>&1; then
            echo "${PKG}@${VER} already on npm — skipping publish"
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ''

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER=${{ steps.version.outputs.version }}
          if gh release view "v$VER" > /dev/null 2>&1; then
            echo "Release v$VER already exists — skipping"
          else
            gh release create "v$VER" --title "v$VER" --generate-notes
          fi
